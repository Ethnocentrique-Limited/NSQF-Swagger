openapi: 3.0.0
info:
  title: NSQF API
  version: 1.0.0
  description: ''
servers:
  - url: '{{BASE_URL}}'
  - url: '{{DGOVAL_BASE_URL}}'
  - url: https://nsqf-staging-nsqfbucketbucket-wrfrkfdv.s3.eu-west-1.amazonaws.com
paths:
  /auth/signin:
    post:
      summary: Login
      responses: {}
      tags:
        - Auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example: "{\r\n    \"email\": \"info@emediabay.com\",\r\n    \"password\": \"Password#123\"\r\n    // \"email\": \"ethicethnic4@gmail.com\",\r\n    // \"password\": \"Ethno#@weq43\"\r\n}"
  /auth/roles:
    get:
      summary: List roles
      responses: {}
      tags:
        - Auth
      security:
        - BearerAuth: []
  /auth/forgot-password:
    post:
      summary: forgot-password
      responses: {}
      tags:
        - Auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
            example:
              email: caracolasstore@gmail.com
  /auth/reset-password:
    post:
      summary: reset-password
      responses: {}
      tags:
        - Auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                newPassword:
                  type: string
                confirmNewPassword:
                  type: string
            example:
              email: caracolasstore@gmail.com
              newPassword: John@weq112
              confirmNewPassword: John@weq112
  /auth/verify-reset-password:
    post:
      summary: verify-reset-password
      responses: {}
      tags:
        - Auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                otp:
                  type: string
                  format: color
                email:
                  type: string
                  format: email
            example:
              otp: '989308'
              email: caracolasstore@gmail.com
  /auth/refresh-token:
    post:
      summary: refresh token
      parameters:
        - name: Cookie
          in: header
          schema:
            type: string
          example: >-
            refreshToken=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..HqYNVzIe7RLlhUV2-uwSxJUcYxCqEpGFEot7GwwXQps
      responses: {}
      tags:
        - Auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
  /auth/me:
    get:
      summary: me
      responses: {}
      tags:
        - Auth
      security:
        - BearerAuth: []
  /api/{trainingProviderId}/team/invite-staff:
    post:
      summary: Invite staff
      responses: {}
      tags:
        - Staff
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
                  format: utc-millisec
                tradeArea:
                  type: string
                role:
                  type: string
                loginUrl:
                  type: string
                  format: uri
            example:
              firstName: David
              lastName: James
              email: caracolasstore+17@gmail.com
              phone: '+2348152957042'
              tradeArea: Mechanical Installation
              role: learner
              loginUrl: https://app.nsqf.com/login
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
  /api/{trainingProviderId}/team/staff/{staffUserId}/resend-invite:
    post:
      summary: Resend invite
      responses: {}
      tags:
        - Staff
      security:
        - BearerAuth: []
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
      - name: staffUserId
        in: path
        required: true
        schema:
          type: string
        example: '{{staffUserId}}'
  /api/{trainingProviderId}/team/staff/{staffUserId}:
    delete:
      summary: Delete staff
      responses: {}
      tags:
        - Staff
      security:
        - BearerAuth: []
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
      - name: staffUserId
        in: path
        required: true
        schema:
          type: string
        example: '{{userId}}'
    get:
      summary: Get staff profile
      responses: {}
      tags:
        - Staff
      security:
        - BearerAuth: []
  /api/{trainingProviderId}/team/staff/{staffUserId}/deactivate:
    post:
      summary: Deactivate staff
      responses: {}
      tags:
        - Staff
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example: "{\r\n    \"confirmed\": true\r\n    // \"replacementStaffUserId\": \"staff id for replacement to reassign learners\"\r\n}"
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
      - name: staffUserId
        in: path
        required: true
        schema:
          type: string
        example: '{{staffUserId}}'
  /api/{trainingProviderId}/team/staff/{staffUserId}/activate:
    post:
      summary: Activate staff
      responses: {}
      tags:
        - Staff
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                confirmed:
                  type: boolean
            example:
              confirmed: true
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
      - name: staffUserId
        in: path
        required: true
        schema:
          type: string
        example: '{{staffUserId}}'
  /auth/invite/set-password:
    post:
      summary: Set password after invite
      responses: {}
      tags:
        - Staff
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                newPassword:
                  type: string
                confirmNewPassword:
                  type: string
            example:
              email: caracolasstore+16@gmail.com
              newPassword: Password@weq112
              confirmNewPassword: Password@weq112
  /api/{trainingProviderId}/team/staff:
    get:
      summary: List staff
      parameters:
        - name: role
          in: query
          schema:
            type: string
          example: qaa
        - name: status
          in: query
          schema:
            type: string
          example: active
        - name: timeRange
          in: query
          description: 7d, 30d, all-time
          schema:
            type: string
          example: 30d
        - name: limit
          in: query
          schema:
            type: integer
          example: 100
        - name: page
          in: query
          schema:
            type: integer
          example: 1
        - name: search
          in: query
          required: false
          deprecated: false
          schema: {}
          example: Rand
      responses: {}
      tags:
        - Staff
      security:
        - BearerAuth: []
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
  /api/{trainingProviderId}/learners/invite/manual:
    post:
      summary: Manual invite learner
      responses: {}
      tags:
        - Learner
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
                  format: utc-millisec
                tradeArea:
                  type: string
                tradeAreaCatalogId:
                  type: string
                level:
                  type: string
                cohortId:
                  type: string
                channels:
                  type: array
                  items:
                    type: string
                inviteLink:
                  type: string
                  format: uri
            example:
              firstName: Jane
              lastName: Wayne
              email: caracolasstore+112@gmail.com
              phone: '08031234117'
              tradeArea: Welding
              tradeAreaCatalogId: 01KQQHS0RKMTT1NP7KE5VTZSGB
              level: Level 3
              cohortId: 01KPF42CRW845NP7561MNS2KDQ
              channels:
                - email
              inviteLink: https://app.nsqf.com/learner/create-account
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
  /api/{trainingProviderId}/centre/cohorts:
    get:
      summary: List Cohorts
      parameters:
        - name: page
          in: query
          schema:
            type: integer
          example: 1
        - name: limit
          in: query
          schema:
            type: integer
          example: 20
      responses: {}
      tags:
        - Learner
      security:
        - BearerAuth: []
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
    post:
      summary: Create cohorts
      responses: {}
      tags:
        - Learner
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                startsAt:
                  type: string
                  format: date
                endsAt:
                  type: string
                  format: date
            example:
              name: April 2026 Intake
              startsAt: '2026-05-01'
              endsAt: '2026-06-01'
  /api/learners/register:
    post:
      summary: Learner accepts invite and creates account
      responses: {}
      tags:
        - Learner
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                inviteToken:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
                  format: utc-millisec
                tradeAreaCatalogId:
                  type: string
                tradeArea:
                  type: string
                tradeAreaName:
                  type: string
                level:
                  type: string
                cohortId:
                  type: string
                cohortName:
                  type: string
                dateOfBirth:
                  type: string
                  format: date-time
                address:
                  type: string
                passportPhotoUrl:
                  type: string
                  format: uri
                courseOrProgramme:
                  type: string
                password:
                  type: string
                confirmPassword:
                  type: string
                hasNoNSQQualification:
                  type: boolean
                otherNames:
                  type: string
                placeOfBirth:
                  type: string
                nationality:
                  type: string
                stateOfOrigin:
                  type: string
                currentPlaceOfWork:
                  type: string
                workplacePhoneNumber:
                  type: string
                  format: utc-millisec
                workplaceEmail:
                  type: string
                  format: email
                workplaceAddress:
                  type: string
                professionalOccupationArea:
                  type: string
                nsqQualifications:
                  type: array
                  items:
                    type: object
                    properties:
                      qualificationName:
                        type: string
                      awardingBody:
                        type: string
                      yearAwarded:
                        type: integer
                      certificateNumber:
                        type: string
                signatureImageUrl:
                  type: string
                  format: uri
                signatureWhiteBackgroundConfirmed:
                  type: boolean
                reviewConfirmed:
                  type: boolean
            example:
              inviteToken: e4ff64a704f65d2f7c08611e251214bddfcda3ea331941a0
              firstName: Jane
              lastName: Wayne
              email: caracolasstore+112@gmail.com
              phone: '08031234117'
              tradeAreaCatalogId: 01KQQHS0RKMTT1NP7KE5VTZSGB
              tradeArea: 01KQQHS0RKMTT1NP7KE5VTZSGB
              tradeAreaName: Welding
              level: Level 3
              cohortId: 01KPF42CRW845NP7561MNS2KDQ
              cohortName: May 2026 Intake
              dateOfBirth: '1990-05-01T00:00:00.000Z'
              address: 1 Example Street
              passportPhotoUrl: https://cdn.example.com/photo.jpg
              courseOrProgramme: Optional programme name
              password: Str0ngP@ss
              confirmPassword: Str0ngP@ss
              hasNoNSQQualification: false
              otherNames: Dayo
              placeOfBirth: Lagos
              nationality: Nigerian
              stateOfOrigin: Adamawa
              currentPlaceOfWork: MTN
              workplacePhoneNumber: '22234445455'
              workplaceEmail: dah@mtn.com
              workplaceAddress: Erwee
              professionalOccupationArea: comms
              nsqQualifications:
                - qualificationName: NSQ Garment
                  awardingBody: Tuteria
                  yearAwarded: 2020
                  certificateNumber: ABC-123
              signatureImageUrl: https://cdn.example.com/signature.png
              signatureWhiteBackgroundConfirmed: true
              reviewConfirmed: true
  /api/learners/invite/prefill:
    get:
      summary: Get learner prefilled invite
      parameters:
        - name: inviteToken
