openapi: 3.0.0
info:
  title: NSQF API
  version: 1.0.0
  description: ''
servers:
  - url: '{{BASE_URL}}'
paths:
  /auth/signin:
    post:
      summary: Login
      responses: {}
      tags:
        - Auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
            example:
              email: info@emediabay.com
              password: Password#123
  /auth/roles:
    get:
      summary: List roles
      responses: {}
      tags:
        - Auth
      security:
        - BearerAuth: []
  /api/team/invite-staff:
    post:
      summary: Invite staff
      responses: {}
      tags:
        - Staff
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
                  format: utc-millisec
                tradeArea:
                  type: string
                role:
                  type: string
                loginUrl:
                  type: string
                  format: uri
            example:
              firstName: John
              lastName: Store
              email: caracolasstore+1@gmail.com
              phone: '+2348152957065'
              tradeArea: Mechanical Installation
              role: practical_trainer_mcp
              loginUrl: https://app.nsqf.com/login
  /api/team/staff/{staffUserId}/resend-invite:
    post:
      summary: Resend invite
      responses: {}
      tags:
        - Staff
      security:
        - BearerAuth: []
    parameters:
      - name: staffUserId
        in: path
        required: true
        schema:
          type: string
        example: '{{staffUserId}}'
  /api/team/staff/{staffUserId}:
    delete:
      summary: Delete staff
      responses: {}
      tags:
        - Staff
      security:
        - BearerAuth: []
    parameters:
      - name: staffUserId
        in: path
        required: true
        schema:
          type: string
        example: '{{userId}}'
    get:
      summary: Get staff profile
      responses: {}
      tags:
        - Staff
      security:
        - BearerAuth: []
  /api/team/staff/{staffUserId}/deactivate:
    post:
      summary: Deactivate staff
      responses: {}
      tags:
        - Staff
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                confirmed:
                  type: boolean
                replacementStaffUserId:
                  type: string
            example:
              confirmed: true
              replacementStaffUserId: staff id for replacement to reassign learners
    parameters:
      - name: staffUserId
        in: path
        required: true
        schema:
          type: string
        example: '{{staffUserId}}'
  /api/team/staff/{staffUserId}/activate:
    post:
      summary: Deactivate staff Copy
      responses: {}
      tags:
        - Staff
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                confirmed:
                  type: boolean
            example:
              confirmed: true
    parameters:
      - name: staffUserId
        in: path
        required: true
        schema:
          type: string
        example: '{{staffUserId}}'
  /auth/invite/set-password:
    post:
      summary: Set password after invite
      responses: {}
      tags:
        - Staff
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                currentPassword:
                  type: string
                newPassword:
                  type: string
                confirmNewPassword:
                  type: string
            example:
              email: caracolasstore@gmail.com
              currentPassword: RfpH_f4!h7Ln
              newPassword: Password@weq112
              confirmNewPassword: Password@weq112
  /api/team/staff:
    get:
      summary: List staff
      parameters:
        - name: role
          in: query
          schema:
            type: string
          example: center_manager
        - name: status
          in: query
          schema:
            type: string
          example: active
        - name: timeRange
          in: query
          schema:
            type: string
          example: 7d
        - name: limit
          in: query
          schema:
            type: integer
          example: '10'
        - name: page
          in: query
          schema:
            type: integer
          example: '1'
      responses: {}
      tags:
        - Staff
      security:
        - BearerAuth: []
  /api/learners/invite/manual:
    post:
      summary: Manual invite learner
      responses: {}
      tags:
        - Learner
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
                  format: utc-millisec
                tradeArea:
                  type: string
                level:
                  type: string
                cohortId:
                  type: string
                channels:
                  type: array
                  items:
                    type: string
                inviteLink:
                  type: string
                  format: uri
            example:
              firstName: Bruce
              lastName: Wayne
              email: caracolasstore+12@gmail.com
              phone: '08031234567'
              tradeArea: Welding
              level: Level 3
              cohortId: 01KPF42CRW845NP7561MNS2KDQ
              channels:
                - email
              inviteLink: https://app.nsqf.com/learner/create-account
  /api/centre/cohorts:
    get:
      summary: List Cohorts
      responses: {}
      tags:
        - Learner
      security:
        - BearerAuth: []
    post:
      summary: Create cohorts
      responses: {}
      tags:
        - Learner
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                startsAt:
                  type: string
                  format: date
                endsAt:
                  type: string
                  format: date
            example:
              name: May 2026 Intake
              startsAt: '2026-05-01'
              endsAt: '2026-06-01'
  /api/learners/register:
    post:
      summary: Learner accepts invite and creates account
      responses: {}
      tags:
        - Learner
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                inviteToken:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
                  format: utc-millisec
                dateOfBirth:
                  type: string
                  format: date-time
                address:
                  type: string
                passportPhotoUrl:
                  type: string
                  format: uri
                tradeArea:
                  type: string
                level:
                  type: string
                cohortId:
                  type: string
                courseOrProgramme:
                  type: string
                password:
                  type: string
                confirmPassword:
                  type: string
                hasNoNSQQualification:
                  type: boolean
                nsqQualifications:
                  type: array
                  items:
                    type: object
                    properties:
                      qualificationName:
                        type: string
                      awardingBody:
                        type: string
                      yearAwarded:
                        type: integer
                      certificateNumber:
                        type: string
                signatureImageUrl:
                  type: string
                  format: uri
                signatureWhiteBackgroundConfirmed:
                  type: boolean
                reviewConfirmed:
                  type: boolean
            example:
              inviteToken: 25d9115f9b562e5b9e62e054541fd1cd7a0af9b09e264735
              firstName: Bruce
              lastName: Wayne
              email: caracolasstore+12@gmail.com
              phone: '+2348012345678'
              dateOfBirth: '1990-05-01T00:00:00.000Z'
              address: 1 Example Street
              passportPhotoUrl: https://cdn.example.com/photo.jpg
              tradeArea: Welding
              level: Level 3
              cohortId: 01KPF42CRW845NP7561MNS2KDQ
              courseOrProgramme: Optional programme name
              password: Str0ngP@ss
              confirmPassword: Str0ngP@ss
              hasNoNSQQualification: false
              nsqQualifications:
                - qualificationName: NSQ Welding
                  awardingBody: Example Council
                  yearAwarded: 2020
                  certificateNumber: ABC-123
              signatureImageUrl: https://cdn.example.com/signature.png
              signatureWhiteBackgroundConfirmed: true
              reviewConfirmed: true
  /api/learners/invite/prefill:
    get:
      summary: Get learner prefilled invite
      parameters:
        - name: inviteToken
          in: query
          required: false
          deprecated: false
          schema: {}
          example: 25d9115f9b562e5b9e62e054541fd1cd7a0af9b09e264735
      responses: {}
      tags:
        - Learner
      security:
        - BearerAuth: []
  /api/learners/{learnerId}/verification/approve:
    post:
      summary: Approve learner
      responses: {}
      tags:
        - Learner
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                confirmed:
                  type: boolean
                allowDuplicateApproval:
                  type: boolean
            example:
              confirmed: true
              allowDuplicateApproval: false
    parameters:
      - name: learnerId
        in: path
        required: true
        schema:
          type: string
        example: '{{learnerId}}'
  /api/learners/{learnerId}/verification/reject:
    post:
      summary: Reject learner
      responses: {}
      tags:
        - Learner
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
            example:
              reason: Documents were unclear. Please resubmit with a valid ID photo.
    parameters:
      - name: learnerId
        in: path
        required: true
        schema:
          type: string
        example: '{{learnerId}}'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
