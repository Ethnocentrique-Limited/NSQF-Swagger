openapi: 3.0.0
info:
  title: NSQF API
  version: 1.0.0
  description: ''
servers:
  - url: '{{BASE_URL}}'
paths:
  /auth/signin:
    post:
      summary: Login
      responses: {}
      tags:
        - Auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
            example:
              email: info@emediabay.com
              password: Password#123
  /auth/roles:
    get:
      summary: List roles
      responses: {}
      tags:
        - Auth
      security:
        - BearerAuth: []
  /auth/forgot-password:
    post:
      summary: forgot-password
      responses: {}
      tags:
        - Auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
            example:
              email: caracolasstore@gmail.com
  /auth/reset-password:
    post:
      summary: reset-password
      responses: {}
      tags:
        - Auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                newPassword:
                  type: string
                confirmNewPassword:
                  type: string
                resetToken:
                  type: string
            example:
              email: caracolasstore@gmail.com
              newPassword: John@weq112
              confirmNewPassword: John@weq112
              resetToken: >-
                eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJlbWFpbCI6ImNhcmFjb2xhc3N0b3JlQGdtYWlsLmNvbSIsInBhc3N3b3JkUmVzZXRUb2tlbklkIjoiMDFLUEZWRDdGUUJXVjVBSE5YQkowRkY3U1YiLCJ0b2tlblR5cGUiOiJwYXNzd29yZF9yZXNldCIsImlhdCI6MTc3NjUwMTMzMSwiZXhwIjoxNzc2NTAxOTMxfQ.fmdDSO5u9APNzz6fP17YRrL_6O8CBisq07oFriIbnq0
  /auth/verify-reset-password:
    post:
      summary: verify-reset-password
      responses: {}
      tags:
        - Auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                otp:
                  type: string
                  format: color
                email:
                  type: string
                  format: email
            example:
              otp: '197248'
              email: caracolasstore@gmail.com
  /auth/refresh-token:
    post:
      summary: refresh token
      parameters:
        - name: Cookie
          in: header
          schema:
            type: string
          example: >-
            refreshToken=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..HqYNVzIe7RLlhUV2-uwSxJUcYxCqEpGFEot7GwwXQps
      responses: {}
      tags:
        - Auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
  /auth/me:
    get:
      summary: me
      responses: {}
      tags:
        - Auth
      security:
        - BearerAuth: []
  /api/{trainingProviderId}/team/invite-staff:
    post:
      summary: Invite staff
      responses: {}
      tags:
        - Staff
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
                  format: utc-millisec
                tradeArea:
                  type: string
                role:
                  type: string
                loginUrl:
                  type: string
                  format: uri
            example:
              firstName: David
              lastName: James
              email: caracolasstore+17@gmail.com
              phone: '+2348152957042'
              tradeArea: Mechanical Installation
              role: iqam
              loginUrl: https://app.nsqf.com/login
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
  /api/{trainingProviderId}/team/staff/{staffUserId}/resend-invite:
    post:
      summary: Resend invite
      responses: {}
      tags:
        - Staff
      security:
        - BearerAuth: []
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
      - name: staffUserId
        in: path
        required: true
        schema:
          type: string
        example: '{{staffUserId}}'
  /api/{trainingProviderId}/team/staff/{staffUserId}:
    delete:
      summary: Delete staff
      responses: {}
      tags:
        - Staff
      security:
        - BearerAuth: []
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
      - name: staffUserId
        in: path
        required: true
        schema:
          type: string
        example: '{{userId}}'
    get:
      summary: Get staff profile
      responses: {}
      tags:
        - Staff
      security:
        - BearerAuth: []
  /api/{trainingProviderId}/team/staff/{staffUserId}/deactivate:
    post:
      summary: Deactivate staff
      responses: {}
      tags:
        - Staff
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example: "{\r\n    \"confirmed\": true\r\n    // \"replacementStaffUserId\": \"staff id for replacement to reassign learners\"\r\n}"
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
      - name: staffUserId
        in: path
        required: true
        schema:
          type: string
        example: '{{staffUserId}}'
  /api/{trainingProviderId}/team/staff/{staffUserId}/activate:
    post:
      summary: Activate staff
      responses: {}
      tags:
        - Staff
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                confirmed:
                  type: boolean
            example:
              confirmed: true
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
      - name: staffUserId
        in: path
        required: true
        schema:
          type: string
        example: '{{staffUserId}}'
  /auth/invite/set-password:
    post:
      summary: Set password after invite
      responses: {}
      tags:
        - Staff
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                newPassword:
                  type: string
                confirmNewPassword:
                  type: string
            example:
              email: caracolasstore+16@gmail.com
              newPassword: Password@weq112
              confirmNewPassword: Password@weq112
  /api/{trainingProviderId}/team/staff:
    get:
      summary: List staff
      parameters:
        - name: role
          in: query
          schema:
            type: string
          example: center_manager
        - name: status
          in: query
          schema:
            type: string
          example: active
        - name: timeRange
          in: query
          description: 7d, 30d, all-time
          schema:
            type: string
          example: 30d
        - name: limit
          in: query
          schema:
            type: integer
          example: 100
        - name: page
          in: query
          schema:
            type: integer
          example: 1
      responses: {}
      tags:
        - Staff
      security:
        - BearerAuth: []
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
  /api/{trainingProviderId}/learners/invite/manual:
    post:
      summary: Manual invite learner
      responses: {}
      tags:
        - Learner
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
                  format: utc-millisec
                tradeArea:
                  type: string
                level:
                  type: string
                cohortId:
                  type: string
                channels:
                  type: array
                  items:
                    type: string
                inviteLink:
                  type: string
                  format: uri
            example:
              firstName: Bruce
              lastName: Wayne
              email: caracolasstore+12@gmail.com
              phone: '08031234567'
              tradeArea: Welding
              level: Level 3
              cohortId: 01KPF42CRW845NP7561MNS2KDQ
              channels:
                - email
              inviteLink: https://app.nsqf.com/learner/create-account
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
  /api/{trainingProviderId}/centre/cohorts:
    get:
      summary: List Cohorts
      parameters:
        - name: page
          in: query
          schema:
            type: integer
          example: 1
        - name: limit
          in: query
          schema:
            type: integer
          example: 20
      responses: {}
      tags:
        - Learner
      security:
        - BearerAuth: []
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
    post:
      summary: Create cohorts
      responses: {}
      tags:
        - Learner
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                startsAt:
                  type: string
                  format: date
                endsAt:
                  type: string
                  format: date
            example:
              name: April 2026 Intake
              startsAt: '2026-05-01'
              endsAt: '2026-06-01'
  /api/learners/register:
    post:
      summary: Learner accepts invite and creates account
      responses: {}
      tags:
        - Learner
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                inviteToken:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
                  format: utc-millisec
                dateOfBirth:
                  type: string
                  format: date-time
                address:
                  type: string
                passportPhotoUrl:
                  type: string
                  format: uri
                tradeArea:
                  type: string
                level:
                  type: string
                cohortId:
                  type: string
                courseOrProgramme:
                  type: string
                password:
                  type: string
                confirmPassword:
                  type: string
                hasNoNSQQualification:
                  type: boolean
                nsqQualifications:
                  type: array
                  items:
                    type: object
                    properties:
                      qualificationName:
                        type: string
                      awardingBody:
                        type: string
                      yearAwarded:
                        type: integer
                      certificateNumber:
                        type: string
                signatureImageUrl:
                  type: string
                  format: uri
                signatureWhiteBackgroundConfirmed:
                  type: boolean
                reviewConfirmed:
                  type: boolean
            example:
              inviteToken: 25d9115f9b562e5b9e62e054541fd1cd7a0af9b09e264735
              firstName: Bruce
              lastName: Wayne
              email: caracolasstore+12@gmail.com
              phone: '+2348012345678'
              dateOfBirth: '1990-05-01T00:00:00.000Z'
              address: 1 Example Street
              passportPhotoUrl: https://cdn.example.com/photo.jpg
              tradeArea: Welding
              level: Level 3
              cohortId: 01KPF42CRW845NP7561MNS2KDQ
              courseOrProgramme: Optional programme name
              password: Str0ngP@ss
              confirmPassword: Str0ngP@ss
              hasNoNSQQualification: false
              nsqQualifications:
                - qualificationName: NSQ Welding
                  awardingBody: Example Council
                  yearAwarded: 2020
                  certificateNumber: ABC-123
              signatureImageUrl: https://cdn.example.com/signature.png
              signatureWhiteBackgroundConfirmed: true
              reviewConfirmed: true
  /api/learners/invite/prefill:
    get:
      summary: Get learner prefilled invite
      parameters:
        - name: inviteToken
          in: query
          required: false
          deprecated: false
          schema: {}
          example: eba62d8b326cf894f6861e17d99d780a7e9d7946a4a82072
      responses: {}
      tags:
        - Learner
      security:
        - BearerAuth: []
  /api/{trainingProviderId}/learners/{learnerId}/verification/approve:
    post:
      summary: Approve learner
      responses: {}
      tags:
        - Learner
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                confirmed:
                  type: boolean
                allowDuplicateApproval:
                  type: boolean
            example:
              confirmed: true
              allowDuplicateApproval: false
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
      - name: learnerId
        in: path
        required: true
        schema:
          type: string
        example: '{{learnerId}}'
  /api/{trainingProviderId}/learners/{learnerId}/verification/reject:
    post:
      summary: Reject learner
      responses: {}
      tags:
        - Learner
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
            example:
              reason: Documents were unclear. Please resubmit with a valid ID photo.
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
      - name: learnerId
        in: path
        required: true
        schema:
          type: string
        example: '{{learnerId}}'
  /api/learners/invite/bulk-template:
    get:
      summary: Download invite template
      responses: {}
      tags:
        - Learner
      security:
        - BearerAuth: []
  /api/{trainingProviderId}/learners/invite/bulk:
    post:
      summary: Bulk invite learners
      responses: {}
      tags:
        - Learner
      security:
        - BearerAuth: []
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
  /api/{trainingProviderId}/learners:
    get:
      summary: Manage learners - List learners
      parameters:
        - name: status
          in: query
          description: >-
            active, pending_invitation, pending_verification, rejected,
            deactivated
          schema:
            type: string
          example: pending_invitation
        - name: tradeArea
          in: query
          schema:
            type: string
          example: Electrical
        - name: level
          in: query
          schema:
            type: integer
          example: 3
        - name: cohortId
          in: query
          schema:
            type: string
          example: ...
        - name: dateFrom
          in: query
          schema:
            type: string
          example: '2026-01-01T00:00:00.000Z'
        - name: dateTo
          in: query
          schema:
            type: string
          example: '2026-12-31T23:59:59.999Z'
        - name: page
          in: query
          schema:
            type: integer
          example: 1
        - name: limit
          in: query
          schema:
            type: integer
          example: 20
      responses: {}
      tags:
        - Manage Learner
      security:
        - BearerAuth: []
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
  /api/{trainingProviderId}/learners/{learnerId}:
    get:
      summary: Manage learners - Learner details
      responses: {}
      tags:
        - Manage Learner
      security:
        - BearerAuth: []
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
      - name: learnerId
        in: path
        required: true
        schema:
          type: string
        example: '{{learnerId}}'
    delete:
      summary: Manage Learner - Delete learner
      responses: {}
      tags:
        - Manage Learner
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                confirmed:
                  type: boolean
            example:
              confirmed: true
  /api/{trainingProviderId}/learners/{learnerId}/digital-folder:
    get:
      summary: Manage learners - Learner Digital Folder
      responses: {}
      tags:
        - Manage Learner
      security:
        - BearerAuth: []
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
      - name: learnerId
        in: path
        required: true
        schema:
          type: string
        example: '{{learnerId}}'
  /api/{trainingProviderId}/learners/{learnerId}/digital-folder/export:
    get:
      summary: Manage learners - Learner Digital Folder export
      responses: {}
      tags:
        - Manage Learner
      security:
        - BearerAuth: []
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
      - name: learnerId
        in: path
        required: true
        schema:
          type: string
        example: '{{learnerId}}'
  /api/{trainingProviderId}/learners/{learnerId}/resend-invite:
    post:
      summary: Manage Learner - Resend invite
      responses: {}
      tags:
        - Manage Learner
      security:
        - BearerAuth: []
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
      - name: learnerId
        in: path
        required: true
        schema:
          type: string
        example: '{{learnerId}}'
  /api/{trainingProviderId}/learners/{learnerId}/deactivate:
    post:
      summary: Manage Learner - Deactivate learner
      responses: {}
      tags:
        - Manage Learner
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                confirmed:
                  type: boolean
            example:
              confirmed: true
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
      - name: learnerId
        in: path
        required: true
        schema:
          type: string
        example: '{{learnerId}}'
  /api/{trainingProviderId}/learners/{learnerId}/activate:
    post:
      summary: Manage Learner - Activate learner
      responses: {}
      tags:
        - Manage Learner
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                confirmed:
                  type: boolean
            example:
              confirmed: true
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
      - name: learnerId
        in: path
        required: true
        schema:
          type: string
        example: '{{learnerId}}'
  /api/{trainingProviderId}/learners/{learnerId}/withdraw-invite:
    delete:
      summary: Manage Learner - Withdraw invite
      responses: {}
      tags:
        - Manage Learner
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                confirmed:
                  type: boolean
            example:
              confirmed: true
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
      - name: learnerId
        in: path
        required: true
        schema:
          type: string
        example: '{{learnerId}}'
  /api/{trainingProviderId}/learners/{learnerId}/digital-folder/{itemId}/sign:
    post:
      summary: Manage learner - Sign digital folder
      responses: {}
      tags:
        - Manage Learner
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                confirmed:
                  type: boolean
            example:
              confirmed: true
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
      - name: learnerId
        in: path
        required: true
        schema:
          type: string
        example: '{{learnerId}}'
      - name: itemId
        in: path
        required: true
        schema:
          type: string
        example: '{{itemId}}'
  /api/{trainingProviderId}/learners/assignment/manual:
    get:
      summary: List manual assignment rows
      parameters:
        - name: assignmentStatus
          in: query
          description: assignmentStatus = assigned | unassigned
          schema:
            type: string
          example: unassigned
        - name: cohortId
          in: query
          schema:
            type: string
          example: ...
        - name: limit
          in: query
          schema:
            type: integer
          example: 25
        - name: page
          in: query
          schema:
            type: integer
          example: 1
        - name: level
          in: query
          schema:
            type: integer
          example: 1
        - name: tradeArea
          in: query
          schema:
            type: string
          example: Welding
        - name: search
          in: query
          description: name or email
          schema:
            type: string
          example: Mike
      responses: {}
      tags:
        - Learner assignment
      security:
        - BearerAuth: []
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
  /api/{trainingProviderId}/learners/{learnerId}/assignment/manual:
    put:
      summary: Manually assign one learner
      responses: {}
      tags:
        - Learner assignment
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                practicalTrainerUserId:
                  type: string
                theoryTrainerUserId:
                  type: string
                qaaUserId:
                  type: string
            example:
              practicalTrainerUserId: 01KPH614CRDZ9GJKNV8N2CGADE
              theoryTrainerUserId: 01KPTPXXRWZF9G5FHYJ048EJ5H
              qaaUserId: 01KPTPHR41Q1ND9K08PWQVR5MX
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
      - name: learnerId
        in: path
        required: true
        schema:
          type: string
        example: '{{learnerId}}'
  /api/{trainingProviderId}/learners/assignment/manual/bulk:
    post:
      summary: Manually assign bulk
      responses: {}
      tags:
        - Learner assignment
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                learnerIds:
                  type: array
                  items:
                    type: string
                practicalTrainerUserId:
                  type: string
                theoryTrainerUserId:
                  type: string
                qaaUserId:
                  type: string
            example:
              learnerIds:
                - 01KPF5MB0NP5F019DFM2SPPDYK
                - 01...
              practicalTrainerUserId: 01KPH614CRDZ9GJKNV8N2CGADE
              theoryTrainerUserId: 01KPTPXXRWZF9G5FHYJ048EJ5H
              qaaUserId: 01KPTPHR41Q1ND9K08PWQVR5MX
    parameters:
      - name: trainingProviderId
        in: path
        required: true
        schema:
          type: string
        example: '{{trainingProviderId}}'
  /api/{trainingProviderId}/learners/assignment/automation/rules:
    get:
      summary: List rules
      parameters:
        - name: page
          in: query
          schema:
            type: integer
          example: 1
        - name: limit
          in: query
          schema:
            type: integer
          example: 20
      responses: {}
      tags:
